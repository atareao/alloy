  <circle cx="24" cy="24" r="22" fill="#1a1a2e" stroke="#863bff" stroke-width="2.5"/>
  <!-- Contenedor estilizado (cubo docker) -->
  <rect x="14" y="16" width="20" height="16" rx="3" fill="none" stroke="#47bfff" stroke-width="2"/>
  <!-- Barra superior (tapa) -->
  <rect x="12" y="13" width="24" height="4" rx="2" fill="#863bff"/>
  <!-- Líneas de detalle interiores -->
  <line x1="14" y1="22" x2="34" y2="22" stroke="#47bfff" stroke-width="1.2" opacity="0.5"/>
  <line x1="14" y1="27" x2="28" y2="27" stroke="#47bfff" stroke-width="1.2" opacity="0.3"/>
  <!-- Letra A estilizada como aleación -->
  <path d="M24 10 L30 22 L18 22 Z" fill="#863bff" opacity="0.15"/>
